type Sprint {
  id: ID!
  token: String!
  name: String
  description: String
  isOpen: Boolean!
  isVisible: Boolean!
  status: String
  startAt: String
  endAt: String
  createdAt: String!
}

type Product {
  id: ID!
  sku: String!
  name: String!
  description: String
  images: [String!]!
  createdAt: String!
}

type VariantAttribute {
  name: String!
  value: String!
}

type ProductVariant {
  attributes: [VariantAttribute!]!
}

type SprintProduct {
  id: ID!
  sprintId: ID!
  product: Product!
  variant: ProductVariant
  priceCents: Int!
  listPriceCents: Int
  discountCents: Int
  stock: Int
}

type Customer {
  id: ID!
  name: String!
  email: String!
  metadata: String
  createdAt: String!
}

type SprintContractItem {
  id: ID!
  sprintProductId: ID!
  product: Product!
  quantity: Int!
  priceCents: Int!
  discountCents: Int
  subtotalCents: Int!
  variant: ProductVariant
}

type SprintContract {
  id: ID!
  orderId: String!
  sprintId: ID!
  customer: Customer!
  totalCents: Int!
  notes: String
  requestStatus: String!
  paymentStatus: String!
  items: [SprintContractItem!]!
  createdAt: String!
}

input OrderItemInput {
  sprintProductId: ID!
  quantity: Int!
  variant: ProductVariant
}

input PlaceOrderInput {
  sprintId: ID!
  customerId: ID!
  items: [OrderItemInput!]!
  notes: String
}

type PlaceOrderPayload {
  contract: SprintContract!
}

type Query {
  health: String
  sprints(isVisible: Boolean, isOpen: Boolean): [Sprint!]!
  sprint(token: String!): Sprint
  products: [Product!]!
  sprintProducts(sprintId: ID!): [SprintProduct!]!
  contracts(customerId: ID!): [SprintContract!]!
  contract(orderId: String!): SprintContract
}

type Mutation {
  placeOrder(input: PlaceOrderInput!): PlaceOrderPayload!
}
